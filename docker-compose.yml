services:
  # Backend Service
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
      - "6000:6000"
    env_file:
      - ./server/.env
    restart: always

  # Frontend Service
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.baselearn.in
      - API_PROXY_TARGET=http://backend:5000
    depends_on:
      - backend
    restart: always
