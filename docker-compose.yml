services:
  # Backend Service — uses host networking so it can reach external services (BBB, S3, etc.)
  # without Docker bridge/NAT issues on cloud providers.
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    network_mode: "host"   # ← shares host network stack; ports below are for reference only
    env_file:
      - ./server/.env
    volumes:
      - ./server/public/uploads:/app/public/uploads
    restart: always

  # Frontend Service
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.baselearn.in
      - NEXT_PUBLIC_BACKEND_URL=https://api.baselearn.in
      - API_PROXY_TARGET=http://localhost:5000   # backend is on host network now
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - backend
    restart: always

